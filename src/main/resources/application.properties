spring.application.name=Backend
server.port=${SERVER_PORT:8080}

# Active profile: set to 'local' for IDE dev (loads application-local.properties)
# Profil actif: mettre 'local' pour dev IDE (charge application-local.properties)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL - credentials from environment variables (never hardcoded)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# JWT - secret from environment variable
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.gestionretours=DEBUG
logging.level.org.hibernate.SQL=DEBUG